name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify repository shape
        run: |
          test -f README.md
          test -f scripts/bootstrap_fixnet_host.sh
          test -f scripts/evaluate_host_state.py
          test -f scripts/preflight_fixnet_host.sh
          test -f scripts/verify_fixnet_host.sh
          test -f scripts/setup_fixnet_vps.sh
          test -f scripts/test_host_state_harness.py
          test -f scripts/monitor_fixnet_burnin.sh
          test -f examples/.env.example
          test -f examples/demos_peerlist.json.example
          test -f docs/runbooks/vps-bootstrap.md
          test -f docs/runbooks/local-host-bootstrap.md
          test -f docs/runbooks/quickstart-5-minutes.md
          test -f docs/runbooks/monitoring.md
          test -f docs/references/mnemonic-handling.md
          test -f docs/references/public-sharing-boundary.md
          test -f examples/monitoring.env.example
          test -f examples/setup.config.env.example

      - name: Bash syntax check
        run: |
          bash -n scripts/bootstrap_fixnet_host.sh
          bash -n scripts/preflight_fixnet_host.sh
          bash -n scripts/verify_fixnet_host.sh
          bash -n scripts/setup_fixnet_vps.sh
          bash -n scripts/monitor_fixnet_burnin.sh

      - name: Help smoke test
        run: |
          ./scripts/bootstrap_fixnet_host.sh --help >/dev/null
          ./scripts/preflight_fixnet_host.sh --help >/dev/null
          ./scripts/verify_fixnet_host.sh --help >/dev/null
          ./scripts/setup_fixnet_vps.sh --help >/dev/null
          ./scripts/monitor_fixnet_burnin.sh --help >/dev/null

      - name: Host-state harness
        run: |
          python3 scripts/test_host_state_harness.py
